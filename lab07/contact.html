<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier List Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tier List Questions and Concerns Form</h1>
    </header>

    <div class="form">
        <form action="action_page.php" method="post" aria-label="Tier List Contact Form">
            <div>
                <br>
                <label for="fname">First Name:
                <input type="text" id="fname" name="fname" placeholder="Alfredo" aria-required="true"></label><br><br>
            </div>
            
            <div>
                <label for="lname">Last Name:
                <input type="text" id="lname" name="lname" placeholder="Pasta" aria-required="true"></label><br><br>
            </div>

            <div>
                <label for="emaila">Email Adress:
                <input type="email" id="emaila" name="emaila" placeholder="AlfredoP29@yahoo.com" aria-required="true"></label><br><br>
            </div>

            <div>
                <p>Which of these do you think should have a different spot on the tier list?</p>
                <label>
                    <input type="radio" name="option">The Arrow</label><br><br>
                <label>
                    <input type="radio" name="option">The Semicircle</label><br><br>
                <label>
                    <input type="radio" name="option">The Circle</label><br><br>
            </div>

            <div>
                <p>Do you think you're wrong?</p>
                <label>
                    <input type="radio" name="option">Yes.</label><br><br>
                <label>
                    <input type="radio" name="option">OF COURSE I AM.</label><br><br>
                <label>
                    <input type="radio" name="option">THERE ARE NO OTHER OPTIONS OTHER THAN YOU ARE WRONG.</label><br><br>
            </div>

            <div>
                <label for="message"> Message:
                    <textarea name="message" id="message" aria-describedby="message-hint"></textarea></label>
                    <p id="message-hint" class="hint">If think ANYTHING ELSE is wrong with the Tier List
                    Please type those concerns above.
                    </p>
            </div>

            <div>
                <label>
                <input type="reset"></label>
            </div>

            <br>

            <div>
                <label>
                <input type="submit"></label>
            </div>

            <br>
        </form>
    </div>

    <nav>
        <h2>Links to pages</h2>
        <ul>
            <li><a href="index.html">Index</a></li>
            <li><a href="tierlist.html">Tier list</a></li>
            <li class="current">Forms</li>
        </ul>
    </nav>
</body>
</html>
